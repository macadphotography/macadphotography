# Macad Photography — Hugo site configuration
baseURL = "https://macadphotography.com/"
locale = "en-us"
title = "Macad Photography"
enableRobotsTXT = true
enableGitInfo = false
disableKinds = ["taxonomy", "term"]

# Pretty URLs and clean output
[permalinks]
  essays = "/essays/:slug/"

[imaging]
  quality = 82
  resampleFilter = "Lanczos"
  [imaging.exif]
    disableDate = true
    disableLatLong = true

[params]
  tagline = "Memories in a Nutshell"
  description = "Wedding, portraiture, street and food photography by Jon Teo — Macad Photography."
  email = "jon@macadphotography.com"
  phoneSG = "+65 9101 9900"
  phoneUS = "+1 (617) 682 6200"
  facebook = "https://www.facebook.com/macadphotography"
  instagram = "https://www.instagram.com/macadphotography/"

# ---- Navigation menu (flat, street-first) ----
[menus]
  [[menus.main]]
    name = "Street"
    pageRef = "/street"
    weight = 10
  [[menus.main]]
    name = "Portraits"
    pageRef = "/portraits"
    weight = 20
  [[menus.main]]
    name = "Travel"
    pageRef = "/travel"
    weight = 30
  [[menus.main]]
    name = "Food"
    pageRef = "/food"
    weight = 40
  [[menus.main]]
    name = "Weddings"
    pageRef = "/wedding"
    weight = 50
  [[menus.main]]
    name = "SG50"
    pageRef = "/sg50"
    weight = 60

  [[menus.main]]
    identifier = "essays"
    name = "Essays"
    pageRef = "/essays"
    weight = 70
  [[menus.main]]
    name = "About"
    pageRef = "/about"
    weight = 80
  [[menus.main]]
    name = "Contact"
    pageRef = "/contact"
    weight = 90

[markup]
  [markup.goldmark.renderer]
    unsafe = true
