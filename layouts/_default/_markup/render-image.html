{{- $dest := .Destination -}}
{{- $img := .Page.Resources.GetMatch $dest -}}
{{- if $img -}}
  {{- $r := $img.Resize "1800x q82" -}}
  <figure class="essay-figure">
    <img src="{{ $r.RelPermalink }}" width="{{ $r.Width }}" height="{{ $r.Height }}" loading="lazy" decoding="async" alt="{{ .Text }}">
    {{- with .Title }}<figcaption>{{ . }}</figcaption>{{ end -}}
  </figure>
{{- else -}}
  <img src="{{ $dest | safeURL }}" loading="lazy" alt="{{ .Text }}">
{{- end -}}
