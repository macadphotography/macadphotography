<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ if .IsHome }}is-home{{ else }}has-sidebar{{ end }}">
  {{ if .IsHome }}
    <main id="content">
      {{ block "main" . }}{{ end }}
    </main>
  {{ else }}
    {{ partial "sidebar.html" . }}
    <div class="content-wrap">
      <main id="content">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  {{ end }}
  {{ partial "scripts.html" . }}
</body>
</html>
